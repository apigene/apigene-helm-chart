{{- include "apigene.validateAuth" . }}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "apigene.fullname" . }}-env
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_APIGENE_SECRET_KEY: {{ .Values.auth.secretKey | quote }}
  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}
{{- end }}
