{{- if and .Values.backend.enabled .Values.copilot.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: copilot
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: copilot
spec:
  selector:
    app.kubernetes.io/component: copilot
    {{- include "apigene.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: copilot
spec:
  replicas: {{ .Values.copilot.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: copilot
      {{- include "apigene.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: copilot
        {{- include "apigene.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "apigene.imagePullSecrets" . | nindent 6 }}
      {{- include "apigene.nodeScheduling" . | nindent 6 }}
      {{- include "apigene.copilotHostAliases" . | nindent 6 }}
      initContainers:
        {{- include "apigene.waitForBackendInit" . | nindent 8 }}
      containers:
        - name: copilot
          image: {{ include "apigene.copilotImage" . | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: {{ include "apigene.secretName" . }}
          env:
            {{- include "apigene.commonEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /client-api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /client-api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          {{- with .Values.copilot.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
