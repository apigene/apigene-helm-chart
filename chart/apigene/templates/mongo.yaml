{{- if and .Values.mongo.enabled (not .Values.externalMongo.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: mongo
    {{- include "apigene.selectorLabels" . | nindent 4 }}
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongo
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mongo
      {{- include "apigene.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mongo
        {{- include "apigene.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "apigene.imagePullSecrets" . | nindent 6 }}
      {{- include "apigene.nodeScheduling" . | nindent 6 }}
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          command: ["mongod", "--config", "/etc/mongod.conf"]
          ports:
            - name: mongo
              containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-config
              mountPath: /etc/mongod.conf
              subPath: mongod.conf
              readOnly: true
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "cat < /dev/null > /dev/tcp/127.0.0.1/27017"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - "cat < /dev/null > /dev/tcp/127.0.0.1/27017"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          {{- with .Values.mongo.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: mongo-config
          configMap:
            name: mongo-config
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
        labels:
          {{- include "apigene.labels" . | nindent 10 }}
          app.kubernetes.io/component: mongo
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.mongo.storageClass }}
        storageClassName: {{ .Values.mongo.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.mongo.storage }}
{{- end }}
