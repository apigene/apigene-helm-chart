{{- if and .Values.redis.enabled (not .Values.externalRedis.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/component: redis
    {{- include "apigene.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
      {{- include "apigene.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
        {{- include "apigene.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "apigene.imagePullSecrets" . | nindent 6 }}
      {{- include "apigene.nodeScheduling" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --loglevel
            - warning
          ports:
            - name: redis
              containerPort: {{ .Values.redis.port }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
