{{- if and .Values.backend.enabled .Values.mcpGw.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: mcp-gw
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gw
spec:
  selector:
    app.kubernetes.io/component: mcp-gw
    {{- include "apigene.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8001
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gw
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-gw
spec:
  replicas: {{ .Values.mcpGw.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: mcp-gw
      {{- include "apigene.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mcp-gw
        {{- include "apigene.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "apigene.imagePullSecrets" . | nindent 6 }}
      {{- include "apigene.nodeScheduling" . | nindent 6 }}
      initContainers:
        {{- include "apigene.waitForBackendInit" . | nindent 8 }}
      containers:
        - name: mcp-gw
          image: {{ include "apigene.mcpGwImage" . | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - secretRef:
                name: {{ include "apigene.secretName" . }}
          env:
            {{- include "apigene.commonEnv" . | nindent 12 }}
            - name: APIGENE_URL
              value: "http://nginx:{{ .Values.service.port }}"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          {{- with .Values.mcpGw.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
