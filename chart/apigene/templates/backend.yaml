{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/component: backend
    {{- include "apigene.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ include "apigene.namespace" . }}
  labels:
    {{- include "apigene.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "apigene.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "apigene.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "apigene.imagePullSecrets" . | nindent 6 }}
      {{- include "apigene.nodeScheduling" . | nindent 6 }}
      initContainers:
        {{- include "apigene.waitForMongoInit" . | nindent 8 }}
        {{- include "apigene.waitForRedisInit" . | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "apigene.backendImage" . | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["app"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ include "apigene.secretName" . }}
          env:
            {{- include "apigene.commonEnv" . | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
