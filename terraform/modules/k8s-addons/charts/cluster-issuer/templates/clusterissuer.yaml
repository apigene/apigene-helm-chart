apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.name }}
spec:
  acme:
    server: {{ .Values.acmeServer | quote }}
    email: {{ .Values.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.name }}
    solvers:
      - http01:
          ingress:
            class: nginx
