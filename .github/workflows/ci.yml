name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTH_SECRET: testsecret12345678901234567890123456789012
  TEARDOWN: "1"

jobs:
  chart:
    name: Chart validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.4

      - name: Run chart tests
        run: ./scripts/ci.sh chart

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: chart
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.4

      - name: Deploy chart to k3d
        run: |
          chmod +x scripts/*.sh tests/*.sh
          SKIP_TESTS=1 TEARDOWN=0 ./scripts/test-local-cluster.sh

      - name: Smoke and integration tests
        run: ./scripts/ci-e2e-tests.sh
        env:
          APIGENE_NAMESPACE: apigene
          APIGENE_PORT: "18080"

      - name: Tear down k3d cluster
        if: always()
        run: k3d cluster delete apigene-helm-test || true
